<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galaxia de Amor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Video de la Galaxia (Fondo en Loop) -->
    <video id="galaxy-video" src="/galaxia inicio.mp4" autoplay muted loop playsinline preload="auto"></video>

    <!-- Bolitas Flotantes de Mensajes (HTML sobre el video) -->
    <div id="orbiting-messages">
      <div class="orbit-ring" style="--orbit-size: 20vmin; --duration: 40s; --delay: 0s;">
        <div class="message-ball" data-title="🌹 Amoréa" data-text="El planeta donde nacen los sentimientos más puros del universo. Aquí el aire respira pasión y cada latido del corazón resuena con la fuerza de un amor infinito. En este mundo, nuestras miradas se cruzaron por primera vez y el destino quedó sellado. Un lugar donde siempre florece la ternura y la promesa de estar juntos para siempre." data-img="/bear_1.png">
          <img src="/bear_1.png" alt="Amoréa" />
          <span class="ball-title">🌹 Amoréa</span>
        </div>
      </div>
      <div class="orbit-ring" style="--orbit-size: 24vmin; --duration: 40s; --delay: -5.7s;">
        <div class="message-ball" data-title="✨ Lunaria" data-text="Un mundo iluminado por una luna eterna donde viven las promesas de amor. Bajo su luz plateada, nuestros secretos más profundos y nuestros sueños más dulces toman forma. Es el refugio donde el tiempo se detiene para dejarnos disfrutar de cada abrazo. Una luna que es testigo de que este sentimiento jamás conocerá el final." data-img="/bear_2.png">
          <img src="/bear_2.png" alt="Lunaria" />
          <span class="ball-title">✨ Lunaria</span>
        </div>
      </div>
      <div class="orbit-ring" style="--orbit-size: 28vmin; --duration: 40s; --delay: -11.4s;">
        <div class="message-ball" data-title="💫 Eternia" data-text="El planeta donde el amor no conoce el tiempo ni la distancia. Aquí comprendí que no importa lo lejos que estemos, nuestras almas siempre encontrarán el camino de regreso. Cada estrella en su cielo representa un recuerdo hermoso que hemos construido juntos. Este es nuestro universo privado, donde siempre seremos infinitos." data-img="/bear_3.png">
          <img src="/bear_3.png" alt="Eternia" />
          <span class="ball-title">💫 Eternia</span>
        </div>
      </div>
      <div class="orbit-ring" style="--orbit-size: 32vmin; --duration: 40s; --delay: -17.1s;">
        <div class="message-ball" data-title="❤️ Valenthera" data-text="El planeta del corazón valiente, donde dos almas destinadas se encuentran. Aquí aprendimos a superar todos los miedos y a luchar con fuerza por lo que sentimos. En sus tierras, el amor es la única ley y la sinceridad nuestro escudo. Juntos hemos demostrado que no hay desafío en la galaxia que nuestro cariño no pueda vencer." data-img="/bear_4.png">
          <img src="/bear_4.png" alt="Valenthera" />
          <span class="ball-title">❤️ Valenthera</span>
        </div>
      </div>
      <div class="orbit-ring" style="--orbit-size: 36vmin; --duration: 40s; --delay: -22.8s;">
        <div class="message-ball" data-title="🧿 Aurelia" data-text="Un planeta dorado donde cada estrella guarda una historia de amor. Su brillo refleja la inmensa felicidad que me da despertar pensando en ti cada mañana. Caminar por sus senderos de luz es como navegar por la paz que solo tus besos me pueden dar. Una obra de arte cósmica diseñada exclusivamente para celebrar nuestra unión." data-img="/bear_1.png">
          <img src="/bear_1.png" alt="Aurelia" />
          <span class="ball-title">🧿 Aurelia</span>
        </div>
      </div>
      <div class="orbit-ring" style="--orbit-size: 40vmin; --duration: 40s; --delay: -28.5s;">
        <div class="message-ball" data-title="🌙 Serenova" data-text="El mundo de la paz, la calma y el amor verdadero. Cuando la vida se vuelve un caos, solo necesito pensar en este lugar para encontrar la tranquilidad en tus brazos. Es el oasis donde nuestras diferencias se disuelven y solo queda la comprensión absoluta. Aquí nuestro amor crece sano, libre, fuerte y sereno como el universo." data-img="/bear_2.png">
          <img src="/bear_2.png" alt="Serenova" />
          <span class="ball-title">🌙 Serenova</span>
        </div>
      </div>
      <div class="orbit-ring" style="--orbit-size: 44vmin; --duration: 40s; --delay: -34.2s;">
        <div class="message-ball" data-title="💎 Celestia" data-text="Un planeta celestial donde las almas conectadas por el destino se encuentran. Su atmósfera está llena de destellos que me recuerdan al brillo de tus ojos cuando sonríes. Este es el rincón sagrado donde prometimos cuidarnos en cada vida y en cada realidad. Nuestro amor es la joya más brillante y preciada de toda la creación." data-img="/bear_3.png">
          <img src="/bear_3.png" alt="Celestia" />
          <span class="ball-title">💎 Celestia</span>
        </div>
      </div>
    </div>

    <!-- Overlay para la transición (Pantallazo blanco) -->
    <div id="fade-overlay"></div>

    <!-- Botón de inicio -->
    <button id="start-btn">Iniciar Viaje</button>

    <!-- Video Cinemático Final (Carta de Amor) -->
    <video id="final-video" src="/carta de amor.mp4" playsinline controlsList="nodownload nofullscreen" preload="auto"></video>

    <!-- Contenedor Scrollable para la Carta Final -->
    <div id="letter-container">
        <img id="final-letter-img" src="/carta de amor.png" alt="Carta de Amor" />
    </div>

    <!-- Modal para las Bolitas Flotantes -->
    <div id="message-modal">
        <div class="modal-content">
            <img id="modal-img" src="/cute_love_bear.png" alt="Bear Love" />
            <h2 id="modal-title">Título</h2>
            <p id="modal-text">Mensaje de amor</p>
            <button id="close-modal">CERRAR ✦</button>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
